<!DOCTYPE html>
<html>
<head>
    <title>AgentEvolver Self-Improvement Settings</title>
</head>
<body>
    <div x-data>
        <template x-if="config">
            <div x-init="
                if (config.self_questioning_enabled === undefined) config.self_questioning_enabled = true;
                if (config.task_generation_frequency === undefined) config.task_generation_frequency = 60;
                if (config.self_navigating_enabled === undefined) config.self_navigating_enabled = true;
                if (config.experience_pool_size === undefined) config.experience_pool_size = 1000;
                if (config.self_attributing_enabled === undefined) config.self_attributing_enabled = true;
                if (config.credit_assignment_depth === undefined) config.credit_assignment_depth = 5;
                if (config.session_duration === undefined) config.session_duration = 30;
                if (config.auto_schedule === undefined) config.auto_schedule = false;
            ">
                <h2>AgentEvolver Self-Improvement Settings</h2>
                <p>Configure the self-evolving mechanisms for your agent.</p>
                
                <div style="margin-bottom: 20px;">
                    <h3>Self-Questioning (Automatic Task Generation)</h3>
                    <label>
                        <input type="checkbox" x-model="config.self_questioning_enabled"> Enable Self-Questioning
                    </label><br>
                    <label>
                        Task Generation Frequency (minutes):
                        <input type="number" x-model.number="config.task_generation_frequency" min="1" max="1440">
                    </label>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <h3>Self-Navigating (Experience-guided Exploration)</h3>
                    <label>
                        <input type="checkbox" x-model="config.self_navigating_enabled"> Enable Self-Navigating
                    </label><br>
                    <label>
                        Experience Pool Size (max entries):
                        <input type="number" x-model.number="config.experience_pool_size" min="10" max="10000">
                    </label>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <h3>Self-Attributing (Credit Assignment)</h3>
                    <label>
                        <input type="checkbox" x-model="config.self_attributing_enabled"> Enable Self-Attributing
                    </label><br>
                    <label>
                        Credit Assignment Depth (steps):
                        <input type="number" x-model.number="config.credit_assignment_depth" min="1" max="50">
                    </label>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <h3>General Settings</h3>
                    <label>
                        Self-Improvement Session Duration (minutes):
                        <input type="number" x-model.number="config.session_duration" min="1" max="240">
                    </label><br>
                    <label>
                        <input type="checkbox" x-model="config.auto_schedule"> Automatically schedule self-improvement sessions
                    </label>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
